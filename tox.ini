[tox]
skipsdist=True
skip_missing_interpreters = True
envlist = fmt, lint, unit
requires =
    tox-uv

[vars]
src_path = {toxinidir}/src/
tst_path = {toxinidir}/tests/
lib_path = {toxinidir}/lib/charms/user_verification_service_operator
all_path = {[vars]src_path} {[vars]tst_path}

[testenv]
base_python = python3.10
setenv =
  PYTHONPATH = {toxinidir}:{toxinidir}/lib:{[vars]src_path}
  PY_COLORS=1
passenv =
  PYTHONPATH
  CHARM_BUILD_DIR
  MODEL_SETTINGS
runner = uv-venv-lock-runner

[testenv:py]
description = Prepare local development tools
dependency_groups = dev
commands =
    pre-commit install -t commit-msg

[testenv:fmt]
description = Apply coding style standards
dependency_groups = fmt
commands =
    isort {[vars]all_path}
    ruff format {[vars]all_path}

[testenv:lint]
description = Check code against coding style standards
dependency_groups = lint
commands =
    codespell {toxinidir}/
    isort --check-only --diff {[vars]all_path}
    ruff check --show-fixes {[vars]all_path}

[testenv:unit]
description = Run unit tests
dependency_groups = unit
commands =
    coverage run --source={[vars]src_path} \
        -m pytest --ignore={[vars]tst_path}integration -v --tb native -s {posargs}
    coverage report --data-file={toxinidir}/.cover/.coverage
    coverage xml --data-file={toxinidir}/.cover/.coverage

[testenv:integration]
description = Run integration tests
depends =
    build-prerequisites
pass_env =
    CHARM_PATH
dependency_groups = integration
commands =
    pytest -v --tb native {[vars]tst_path}integration --log-cli-level=INFO -s {posargs}

[testenv:build-prerequisites]
description = Install necessary Linux packages for python dependencies
runner = virtualenv
dependency_groups =
allowlist_externals =
    sudo
    apt-get
commands =
    sudo apt-get update
    sudo apt-get install -y python3-dev \
        libldap2-dev \
        libsasl2-dev
